server {
    listen 80;
    client_max_body_size 20M;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy api requests directly if not using a host-level Nginx
    # location /api/v1 {
    #     proxy_pass http://backend:8000;
    # }
}
